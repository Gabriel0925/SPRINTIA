    <script>
        async function NomCoachInit() {
            // Recup datas
            let CoachUserDB = await db.JRM_Coach.toArray()

            if (CoachUserDB.length > 0) { // Si il y a des datas
                let NomCoach = CoachUserDB.map(elementDB => elementDB.nom)
                let AvatarCoach = CoachUserDB.map(elementDB => elementDB.avatar)
                
                document.getElementById("nom-coach").innerHTML = `Configuration <strong>${NomCoach}</strong>`
            }

            return
        }

        window.addEventListener("DOMContentLoaded", () => {
            NomCoachInit()
        })
    </script>
