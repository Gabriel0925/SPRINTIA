            <li class="tab-bars-items" onclick="navigationLinks(this, 'tab-bar', 'profondeur2', 'Outils')">

    <h1>Importer des données</h1>

    <h2>Importer un entraînement</h2>
    <div class="action-list">

        <a href="import-tcx.html">
            <div class="action-list-item">
                <i class="fs-icon_file"></i>
                <p class="text-param">Fichier <strong>TCX</strong> (universelle)</p>
            </div>
        </a>
        <a href="import-sprintia.html">
            <div class="action-list-item">
                <i class="fs-icon_file_json"></i>
                <p class="text-param">Fichier <strong>SPRINTIA</strong></p>
            </div>
        </a>
 
    </div>

    <h2>Importer un historique d'entraînement</h2>
    <div class="action-list">    
        <a href="import-garmin-csv.html">
            <div class="action-list-item">
                <i class="fs-icon_file_csv"></i>
                <p class="text-param">Fichier <strong>Garmin</strong></p>
            </div>
        </a>
        <a href="import-trainingpeaks-csv.html">
            <div class="action-list-item">
                <i class="fs-icon_file_csv"></i>
                <p class="text-param">Fichier <strong>TrainingPeaks</strong></p>
            </div>
        </a>

    </div>
    
    <script src="../../assets/base-js/base.js"></script>

    <script src="../../assets/bibliotheques/dexie.js"></script>
