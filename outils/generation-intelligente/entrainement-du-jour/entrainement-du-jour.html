<!DOCTYPE html>
<html lang="fr">
<head>
    <title>SPRINTIA - Entraînement du jour</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../../../css/style.css">
    <link rel="icon" type="image/png" href="../../../assets/icons-SPRINTIA/icon-512-V5.1.png">
    <link rel="manifest" href="../../../manifest-V5.json">

    <meta name="theme-color" content="#000000">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="SPRINTIA">
    <link rel="apple-touch-icon" href="../../../assets/icons-SPRINTIA/icon-192-V5.1.png">

</head>

<body>
    <div class="container-logo-dynamique">
        <div class="logo-dynamique"></div>
    </div>
    
    <section class="header">

        <div class="logo" onclick="navigationLinks(this, 'header', 'profondeur3', 'Entraînement')">SPRINTIA</div>

        
        <ul class="header-container-items">

            <li class="header-items" onclick="navigationLinks(this, 'header', 'profondeur3', 'Entraînement')">
                <i class="fs-icon_entrainement"></i>
                Entraînement
            </li>
            <li class="header-items" onclick="navigationLinks(this, 'header', 'profondeur3', 'Progression')">
                <i class="fs-icon_progression"></i>
                Progression
            </li>
            <li class="header-items selected" onclick="navigationLinks(this, 'header', 'profondeur3', 'Outils')">
                <i class="fs-icon_outils"></i>
                Outils
            </li>
            <li class="header-items" onclick="navigationLinks(this, 'header', 'profondeur3', 'Plus')">
                <i class="fs-icon_plus_horizontal"></i>
                Plus
            </li>

        </ul>

    </section>
    <section class="tab-bars">

        <ul class="tab-bars-container-items">

            <li class="tab-bars-items" onclick="navigationLinks(this, 'tab-bar', 'profondeur3', 'Entraînement')">
                <i class="fs-icon_entrainement"></i>
                <p class="tab-bars-items-name">Entraînement</p>
            </li>
            <li class="tab-bars-items" onclick="navigationLinks(this, 'tab-bar', 'profondeur3', 'Progression')">
                <i class="fs-icon_progression"></i>
                <p class="tab-bars-items-name">Progression</p>
            </li>
            <li class="tab-bars-items selected" onclick="navigationLinks(this, 'tab-bar', 'profondeur3', 'Outils')">
                <i class="fs-icon_outils"></i>
                <p class="tab-bars-items-name">Outils</p>
            </li>
            <li class="tab-bars-items" onclick="navigationLinks(this, 'tab-bar', 'profondeur3', 'Plus')">
                <i class="fs-icon_plus_horizontal"></i>
                <p class="tab-bars-items-name">Plus</p>
            </li>

        </ul>

    </section>
    
    <h1>Entraînement du jour</h1>

    <section class="container-item-workout-day">

        <section class="item-workout-day">

            <h2>Quel sport ?</h2>
            <section class="container-sport-workout-day">

                <div class="sport-item selected" onclick="selectItem(this, '.sport-item')">
                    <i class="fs-icon_entrainement"></i>
                </div>

                <div class="container-deux-sport-item">

                    <div class="sport-item" onclick="selectItem(this, '.sport-item')">
                        <i class="fs-icon_velo"></i>
                    </div>
                    <div class="sport-item" onclick="selectItem(this, '.sport-item')">
                        <i class="fs-icon_natation"></i>
                    </div>

                </div>

            </section>

        </section>

        <section class="item-workout-day">

            <h2>Quelle durée ?</h2>
            <section class="container-intensity-workout-day">
                
                <div class="intensity-item duree selected" onclick="selectItem(this, '.intensity-item.duree')">
                    <p>20</p>
                </div>
                <div class="intensity-item duree" onclick="selectItem(this, '.intensity-item.duree')">
                    <p>40</p>
                </div>
                <div class="intensity-item duree" onclick="selectItem(this, '.intensity-item.duree')">
                    <p>60</p>
                </div>
            
            </section>

        </section>
        
        <section class="item-workout-day">

            <h2>Quelle intensité ?</h2>
            <section class="container-intensity-workout-day">
                
                <div class="intensity-item intensity selected" id="facile" onclick="selectItem(this, '.intensity-item.intensity')">Facile</div>
                <div class="intensity-item intensity" id="modere" onclick="selectItem(this, '.intensity-item.intensity')">Modéré</div>
                <div class="intensity-item intensity" id="difficile" onclick="selectItem(this, '.intensity-item.intensity')">Difficile</div>
            
            </section>

        </section>
        
    </section>

    <div class="container-center-marge">
        <button>Générer des entraînements</button>
    </div>

    <script src="../../../assets/base-js/base.js"></script>
    <script src="script-entrainement-du-jour.js"></script>
    <script defer src="/_vercel/insights/script.js"></script>
    
</body>
</html>
