    <h1>Ajout niveau course</h1>


    <!-- Pour le burger menu -->
    <script src="../../assets/base-js/base.js"></script>

    <!-- Import de la bibliothèque pr le graphique -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.7.1/chart.min.js"></script>    
    <!-- Import bibliothèque pour simplifier le code de indexed db -->
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <script src="../../assets/base-js/db-config.js"></script> <!-- Connexion bdd -->
    
    <script src="script-outil.js" defer></script> <!-- defer permet d'obliger que le html sexecute completement et seulement ensuite il lance le script c'est pour le telechargement de la bibliotheque -->
    
    <!-- Remplissage du input date a la date now -->
    <script>
        let ChampDate = document.getElementById("date-niveau-course")
        let DateActuelle = new Date().toISOString() // ça renvoie ça "2026-01-24T13:55:37.171Z"
        // Enlever la partie qui nous interrese pas
        DateActuelle = DateActuelle.split("T") // ['2026-01-24', '13:57:55.505Z']
        DateActuelle = DateActuelle[0] // '2026-01-24'

        ChampDate.max = DateActuelle // bloque la saisi de date dans le futur
        ChampDate.value = DateActuelle

        // pour détecter si lorsqu'on est dans le formulaire il y a un appuie sur la touche entrée
        let formKeyEntry = document.querySelector(".form")
        formKeyEntry.addEventListener("keydown", (event) => {
            if (event.key === "Enter") {
                SauvegardeNiveauCourse()
            }
        })
    </script>
    
    <!-- Pour avoir les statistiques de visite du site -->
    <script defer src="/_vercel/insights/script.js"></script>
